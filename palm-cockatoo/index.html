const FACTS=[
  'Palm cockatoos are very picky about where they raise their babies, so a good nest has to feel just right.',
  'Artificial nest hollows can help birds when old trees with natural hollows are hard to find.'
];

  {name:'Hollow Harmony', subtitle:'Tap the beat and steady the first sunny nest.', notes:20, speed:206, safetyStart:74, drain:2.6, repairs:false, storm:false, fact:FACTS[0]},
  {name:'Rainforest Rattle', subtitle:'The beat gets busier and nests need quick fix-ups.', notes:28, speed:246, safetyStart:72, drain:3.6, repairs:true, storm:false, fact:FACTS[1]},
  {name:'Redcheek Finale', subtitle:'Keep the final hatch safe through the big wild storm.', notes:34, speed:278, safetyStart:76, drain:4.3, repairs:true, storm:true, fact:null}

const PAD_Y=H-70, JUDGE_Y=GAME_BOTTOM-34;
function roundNum(n){return Math.max(0,Math.round(n));}
function fmt(n){return String(n??'');}
function addBadge(scene,x,y,text,fill=C.panel,textColor='#F7E7B7',width=null,depth=30,font='bold 16px "Trebuchet MS"'){
  const t=scene.add.text(0,0,text,{font,fill:textColor,align:'center',wordWrap:width?{width:width-24}:undefined,lineSpacing:4}).setOrigin(0.5);
  const w=width||Math.max(76,t.width+24), h=Math.max(30,t.height+14);
  const g=scene.add.graphics();
  g.fillStyle(fill,1).lineStyle(3,C.cream,0.95).fillRoundedRect(-w/2,-h/2,w,h,12).strokeRoundedRect(-w/2,-h/2,w,h,12);
  return scene.add.container(x,y,[g,t]).setDepth(depth);
}
function addButton(scene,x,y,w,h,text,fill,textColor='#160f28'){
  const r=scene.add.rectangle(x,y,w,h,fill).setStrokeStyle(5,C.cream).setInteractive();
  const t=scene.add.text(x,y,text,{font:'bold 24px "Trebuchet MS"',fill:textColor}).setOrigin(0.5);
  scene.tweens.add({targets:r,scaleX:1.04,scaleY:1.04,duration:760,yoyo:true,repeat:-1,ease:'Sine.inOut'});
  return {rect:r,text:t};
}
function createFallbackTextures(scene){
  if(scene.textures.exists('uiPad')) return;
  const g=scene.make.graphics({x:0,y:0,add:false});
  g.fillStyle(C.gold).fillRoundedRect(0,0,90,90,18).lineStyle(4,C.cream).strokeRoundedRect(0,0,90,90,18).fillStyle(C.ink).fillRect(20,36,50,12); g.generateTexture('uiPad',90,90); g.clear();
  g.fillStyle(C.mint).fillRoundedRect(0,0,34,34,10).lineStyle(3,C.cream).strokeRoundedRect(0,0,34,34,10); g.generateTexture('uiNote',34,34); g.clear();
  g.fillStyle(C.red).fillRoundedRect(0,0,40,40,10).lineStyle(3,C.cream).strokeRoundedRect(0,0,40,40,10).fillStyle(C.cream).fillRect(14,12,12,16); g.generateTexture('uiRepair',40,40); g.clear();
  g.fillStyle(C.gold).fillTriangle(10,12,28,2,28,22); g.fillStyle(C.cream).fillRect(0,9,16,6); g.generateTexture('uiArrow',30,24); g.clear();
  g.fillStyle(C.cream).fillRect(16,4,14,16).fillRect(8,18,24,20).fillRect(32,12,8,18).fillStyle(C.red).fillRect(20,18,8,2).fillStyle(C.ink).fillRect(18,12,3,3).fillRect(25,12,3,3); g.generateTexture('uiHand',52,44); g.clear();
  g.fillStyle(C.gold).fillRect(6,6,12,12).fillStyle(C.cream).fillRect(8,8,8,8); g.generateTexture('uiSpark',24,24); g.clear();
  g.fillStyle(C.gold).fillEllipse(10,12,14,18).fillStyle(C.cream).fillRect(8,8,2,2).fillRect(11,8,2,2).fillRect(8,12,5,2); g.generateTexture('eggFallback',20,24); g.clear();
  g.fillStyle(0x222222).fillRect(12,10,24,18).fillRect(16,6,16,8).fillRect(16,28,16,10).fillStyle(C.red).fillRect(8,16,6,6).fillRect(34,16,6,6).fillStyle(C.cream).fillRect(18,16,4,4).fillRect(26,16,4,4).fillRect(20,24,8,2); g.generateTexture('heroFallback',48,48); g.clear();
  g.fillStyle(C.gold).fillRect(10,8,28,28).fillRect(14,4,20,36).fillStyle(C.cream).fillRect(16,14,4,4).fillRect(28,14,4,4).fillStyle(C.ink).fillRect(18,16,2,2).fillRect(30,16,2,2).fillRect(18,26,14,2); g.generateTexture('goalFallback',48,48); g.clear();

}
function processWhiteBg(scene, rawKey, outKey){
  if(scene.textures.exists(outKey)) return;
  if(!scene.textures.exists(rawKey)) return;
  const img=scene.textures.get(rawKey).getSourceImage();
  const src=document.createElement('canvas'); src.width=img.width; src.height=img.height;
  const ctx=src.getContext('2d',{willReadFrequently:true}); ctx.drawImage(img,0,0);
  const data=ctx.getImageData(0,0,src.width,src.height); let minX=src.width,minY=src.height,maxX=-1,maxY=-1;
  for(let i=0;i<data.data.length;i+=4){
    const r=data.data[i],g=data.data[i+1],b=data.data[i+2],a=data.data[i+3],x=(i/4)%src.width,y=((i/4)/src.width)|0;
    if(a && r>244 && g>244 && b>244) data.data[i+3]=0; else if(data.data[i+3]){ if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y; }
  }
  ctx.putImageData(data,0,0);
  if(maxX<0){ scene.textures.addImage(outKey,img); return; }
  const pad=2,w=maxX-minX+1,h=maxY-minY+1;
  const out=document.createElement('canvas'); out.width=w+pad*2; out.height=h+pad*2;
  out.getContext('2d').drawImage(src,minX,minY,w,h,pad,pad,w,h);
  scene.textures.addCanvas(outKey,out);
}
function spriteFor(scene, assetKey, fallbackKey, x, y, w, h, depth=8){
  const key=scene.textures.exists(assetKey)?assetKey:fallbackKey;
  return scene.add.image(x,y,key).setDisplaySize(w,h).setDepth(depth);
}
function drawFrame(scene){
  scene.add.rectangle(CX,H/2,W,H,C.sky);
  scene.add.rectangle(CX,HUD_H/2,W,HUD_H,C.panel);
  scene.add.rectangle(CX,H-CTRL_H/2,W,CTRL_H,C.panel);
  scene.add.rectangle(CX,HUD_H+GAME_H/2,W,GAME_H,0x284768);
  if(scene.textures.exists('bgMain')){
    scene.add.image(CX,HUD_H+GAME_H/2,'bgMain').setDisplaySize(W-14,GAME_H-14).setDepth(0).setAlpha(0.72);
    scene.add.image(CX+14,HUD_H+GAME_H/2+8,'bgMain').setDisplaySize(W-34,GAME_H-42).setDepth(0).setAlpha(0.18).setTint(0xffd486);
  }
  scene.add.rectangle(CX,HUD_H+GAME_H/2,W-14,GAME_H-14,C.panel2,0.18).setStrokeStyle(4,C.cream,0.4).setDepth(1);
  scene.bgFloaters=[];
  for(let i=0;i<10;i++){
    const leaf=scene.add.ellipse(30+(i*53)%W,110+(i*72)%H,22+(i%3)*10,14+(i%2)*6,[C.green,C.gold,C.mint][i%3],0.18).setDepth(1);
    leaf.baseX=leaf.x; leaf.baseY=leaf.y; leaf.seed=i*.7; scene.bgFloaters.push(leaf);
  }
}
function animateBg(scene,t){ if(scene.bgFloaters) scene.bgFloaters.forEach((f,i)=>{ f.x=f.baseX+Math.sin(t*0.0005+f.seed)*(i%2?8:5); f.y=f.baseY+Math.cos(t*0.0004+f.seed)*(i%2?5:3); }); }
function makePattern(levelIndex,total){
  const out=[]; let last=1;
  for(let i=0;i<total;i++){
    let lane;
    if(levelIndex===0) lane=[0,1,2,1][i%4];
    else if(levelIndex===1) lane=[0,1,2,2,1,0,1][i%7];
    else lane=[1,0,2,1,2,0,1,2][i%8];
    if(i>0 && lane===last) lane=(lane+1+(i%2))%3;
    out.push({lane,time:1300+i*(levelIndex===0?760:levelIndex===1?620:560), special:levelIndex===2 && i>8 && i%11===0});
    last=lane;
  }
  return out;
}

class BootScene extends Phaser.Scene{
  constructor(){super('boot');}
  preload(){
    this.add.rectangle(CX,H/2,W,H,C.sky);
    this.add.text(CX,410,'LOADING KOKO\'S FOREST STAGE',{font:'bold 28px "Trebuchet MS"',fill:'#F7E7B7'}).setOrigin(0.5);
    const box=this.add.rectangle(CX,474,340,28,0x2c1d4b).setStrokeStyle(4,C.cream);
    const bar=this.add.rectangle(CX-166,474,0,20,C.gold).setOrigin(0,0.5);
    this.load.on('progress',v=>bar.width=332*v);
    this.load.image('rawHero','assets/sprite-hero.png');
    this.load.image('rawEnemy','assets/sprite-enemy.png');
    this.load.image('rawGoal','assets/sprite-goal.png');
    this.load.image('bgMain','assets/bg-main.png');
  }
  create(){
    createFallbackTextures(this);
    processWhiteBg(this,'rawHero','hero');
    processWhiteBg(this,'rawEnemy','enemy');
    processWhiteBg(this,'rawGoal','goal');
    this.scene.start('title');
  }
}

class PlayScene extends Phaser.Scene{
  constructor(){super('play');}
  init(data){ this.levelIndex=data.levelIndex||0; }
  create(){
    this.level=LEVELS[this.levelIndex];
    this.isTouch=!!this.sys.game.device.input.touch;
    this.notes=[]; this.repairIcons=[]; this.hitFx=[]; this.pointerPads={};
    this.spawned=0; this.cleared=0; this.score=0; this.combo=0; this.safety=this.level.safetyStart; this.power=0; this.specialReady=false; this.repairActive=null; this.over=false;
    this.musicClock=0; this.pattern=makePattern(this.levelIndex,this.level.notes); this.nextIdx=0; this.autoDemoHits=3; this.guideTime=10; this.samplePlayed=false;
    drawFrame(this);
    this.makeHud(); this.makeStage(); this.makePads(); this.bindInput();
    this.showGuide(this.levelIndex===0?'Tap the pads on the beat!':'Keep the beat and watch for fix-up icons!');
  }
  makeHud(){
    spriteFor(this,'hero','heroFallback',34,30,40,40,20);

    addBadge(this,CX,18,`Level ${this.levelIndex+1}: ${this.level.name}`,C.panel2,'#F7E7B7',290,20,'bold 18px "Trebuchet MS"');
    this.topBadge=addBadge(this,CX,44,'',C.panel,'#F7E7B7',410,20,'bold 16px "Trebuchet MS"');
    this.pauseText=this.add.text(CX,GAME_TOP+GAME_H/2,'PAUSED',{font:'bold 44px "Trebuchet MS"',fill:'#FFB703'}).setOrigin(0.5).setDepth(40).setVisible(false);
  }

    this.hero=spriteFor(this,'hero','heroFallback',96,GAME_TOP+160,110,110,8);
    this.heroLabel=addBadge(this,96,GAME_TOP+238,'KOKO REDCHEEK',C.red,'#F7E7B7',158,10,'bold 16px "Trebuchet MS"');
    this.nest=spriteFor(this,'goal','goalFallback',444,GAME_TOP+170,112,112,8);

    this.eggLabel=addBadge(this,444,GAME_TOP+374,'BABY HOPE EGG',C.mint,'#160f28',150,10,'bold 16px "Trebuchet MS"');
    this.laneG=this.add.graphics().setDepth(2);
    this.noteG=this.add.graphics().setDepth(6);
    this.fxG=this.add.graphics().setDepth(7);
    if(this.level.storm){
      this.storm=spriteFor(this,'enemy','enemyFallback',CX,GAME_TOP+102,170,120,8);
      this.stormLabel=addBadge(this,CX,GAME_TOP+170,'THE HOWLING GUST',C.red,'#F7E7B7',172,10,'bold 16px "Trebuchet MS"');
      this.tweens.add({targets:this.storm,angle:3,duration:320,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    }
  }
  makePads(){
    this.pads=[];
    const names=['LEFT','MIDDLE','RIGHT'];
    LANES.forEach((x,i)=>{
      const pad=this.add.image(x,PAD_Y,'uiPad').setDepth(12).setInteractive();
      pad.lane=i; this.pads.push(pad);
      addBadge(this,x,PAD_Y-58,names[i],i===1?C.mint:C.gold,'#160f28',94,13,'bold 16px "Trebuchet MS"');
      pad.on('pointerdown',()=>this.hitLane(i,true));
      this.tweens.add({targets:pad,scaleX:1.05,scaleY:1.05,duration:720+80*i,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    });
    if(!this.isTouch){ addBadge(this,CX,870,this.level.repairs?'A S D or arrows to drum • Click fix-up icons':'A S D or arrows to drum',C.gold,'#160f28',420,20,'bold 18px "Trebuchet MS"'); }
    else { addBadge(this,CX,870,this.level.repairs?'Tap pads and tap glowing fix-ups':'Tap the pads on the beat',C.gold,'#160f28',420,20,'bold 18px "Trebuchet MS"'); }
  }
  bindInput(){
    this.keys=this.input.keyboard.addKeys('A,S,D,LEFT,DOWN,RIGHT,SPACE,P');
    this.input.keyboard.on('keydown-A',()=>this.hitLane(0,false));
    this.input.keyboard.on('keydown-LEFT',()=>this.hitLane(0,false));
    this.input.keyboard.on('keydown-S',()=>this.hitLane(1,false));
    this.input.keyboard.on('keydown-DOWN',()=>this.hitLane(1,false));
    this.input.keyboard.on('keydown-D',()=>this.hitLane(2,false));
    this.input.keyboard.on('keydown-RIGHT',()=>this.hitLane(2,false));
    this.input.keyboard.on('keydown-P',()=>this.togglePause());
    this.input.on('pointerdown',pointer=>{
      if(this.input.pointer1.isDown&&this.input.pointer2.isDown) this.togglePause();
      if(this.repairActive && Phaser.Math.Distance.Between(pointer.x,pointer.y,this.repairActive.x,this.repairActive.y)<42) this.repairNest();
    });
  }
  spawnNote(data){
    this.notes.push({lane:data.lane,y:GAME_TOP+10,speed:this.level.speed,special:data.special&&this.level.storm,hit:false});
    this.spawned++;
  }
  showGuide(text){ this.guideText=text; this.guideTimer=2.2; }
  startHintArrows(){
    if(this.guideArrow) return;
    this.guideArrow=this.add.image(LANES[1],GAME_TOP+100,'uiArrow').setAngle(90).setDepth(30).setScale(1.2);
    this.tweens.add({targets:this.guideArrow,y:'+=12',duration:460,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    this.hand=this.add.image(LANES[1],PAD_Y-92,'uiHand').setDepth(30);
    this.tweens.add({targets:this.hand,y:'+=26',duration:360,yoyo:true,repeat:6,ease:'Sine.inOut'});
    this.time.delayedCall(5000,()=>{ if(this.hand){ this.hand.destroy(); this.hand=null; } });
  }
  trySpawnRepair(){
    if(!this.level.repairs || this.repairActive || this.spawned<6) return;
    if(this.levelIndex===1 && this.spawned%8!==0) return;
    if(this.levelIndex===2 && this.spawned%6!==0) return;
    const x=[180,270,360][(this.spawned/2)%3|0], y=GAME_TOP+240+((this.spawned%2)*90);
    const icon=this.add.image(x,y,'uiRepair').setDepth(11).setInteractive();
    const arrow=this.add.image(x,y-60,'uiArrow').setAngle(90).setDepth(12);
    this.tweens.add({targets:[icon,arrow],scaleX:1.08,scaleY:1.08,duration:520,yoyo:true,repeat:-1,ease:'Sine.inOut'});
    icon.on('pointerdown',()=>this.repairNest());
    this.repairActive={x,y,life:2.8,icon,arrow};
    if(this.guideTime>0) this.showGuide('Tap the glowing fix-up icon!');
  }
  repairNest(){
    if(!this.repairActive) return;
    this.safety=Math.min(100,this.safety+10);
    this.combo+=1; this.score+=120;
    this.spark(this.repairActive.x,this.repairActive.y,C.green);
    this.repairActive.icon.destroy(); this.repairActive.arrow.destroy(); this.repairActive=null;
    this.showGuide('Nice! The nest feels snug again.');
  }
  hitLane(lane){
    if(this.over||this.pauseText.visible) return;
    const note=this.notes.filter(n=>!n.hit && n.lane===lane).sort((a,b)=>Math.abs(a.y-JUDGE_Y)-Math.abs(b.y-JUDGE_Y))[0];
    this.flashPad(lane);
    if(!note){ this.miss(3); return; }
    const dist=Math.abs(note.y-JUDGE_Y);
    if(dist<30) this.hitNote(note,dist<14?'perfect':'good');
    else if(dist<62) this.hitNote(note,'okay');
    else this.miss(2);
  }
  hitNote(note,grade){
    note.hit=true;
    const laneX=LANES[note.lane];
    const add=grade==='perfect'?140:grade==='good'?100:70;
    this.score+=add; this.combo+=1; this.safety=Math.min(100,this.safety+(grade==='okay'?2:4)); this.power=Math.min(100,this.power+(grade==='perfect'?12:8));
    this.spark(laneX,JUDGE_Y, note.special?C.gold:C.mint);
    if(note.special){ this.safety=Math.min(100,this.safety+12); this.score+=200; if(this.storm){ this.storm.setTintFill(0xfff0a0); this.time.delayedCall(180,()=>this.storm.clearTint()); } this.showGuide('Canopy Drum burst! The storm backs off.'); }
  }
  miss(amount){ this.combo=0; this.safety=Math.max(0,this.safety-amount); }
  flashPad(lane){ const p=this.pads[lane]; if(!p) return; this.tweens.add({targets:p,scaleX:1.18,scaleY:1.18,duration:90,yoyo:true}); }
  spark(x,y,color){ const s=this.add.image(x,y,'uiSpark').setTint(color).setScale(0.8).setDepth(20); this.tweens.add({targets:s,scale:2.8,alpha:0,duration:240,onComplete:()=>s.destroy()}); }
  togglePause(){ if(this.over) return; this.pauseText.setVisible(!this.pauseText.visible); }
  finishLevel(){
    this.over=true;
    if(this.levelIndex===LEVELS.length-1) this.scene.start('end',{score:this.score});
    else this.scene.start('fact',{level:this.levelIndex,next:this.levelIndex+1,score:this.score,safety:this.safety,fact:this.level.fact,fail:false});
  }
  failLevel(){ this.over=true; this.scene.start('fact',{level:this.levelIndex,score:this.score,safety:this.safety,fail:true}); }
  updateHud(){
    this.topBadge.list[1].setText(`Score ${this.score}   Nest Safety ${roundNum(this.safety)}%   ${this.level.storm?`Drum Burst ${roundNum(this.power)}%`:`Combo ${this.combo}`}`);
    if(!this.hudBars){ this.hudBars=this.add.graphics().setDepth(22); }
    this.hudBars.clear();
    this.hudBars.fillStyle(0x1c1432).fillRoundedRect(12,62,516,18,8);
    this.hudBars.fillStyle(C.green).fillRoundedRect(14,64,Math.max(6,512*this.safety/100),14,7);
    if(this.level.storm){ this.hudBars.fillStyle(0x1c1432).fillRoundedRect(12,84,516,14,7); this.hudBars.fillStyle(C.gold).fillRoundedRect(14,86,Math.max(0,512*this.power/100),10,6); }
    if(!this.guideBadge) this.guideBadge=addBadge(this,CX,844,'',C.gold,'#160f28',420,22,'bold 18px "Trebuchet MS"');
    if(this.guideTimer>0&&this.guideText) this.guideBadge.list[1].setText(this.guideText);
    else this.guideBadge.list[1].setText(this.levelIndex===0?'Tap pads on the beat':this.level.repairs?'Drum, then tap fix-up icons when they glow':'Keep the beat');
  }
  updateNotes(delta){
    this.musicClock+=delta;
    while(this.nextIdx<this.pattern.length && this.musicClock>=this.pattern[this.nextIdx].time){ this.spawnNote(this.pattern[this.nextIdx]); this.nextIdx++; this.trySpawnRepair(); }
    if(this.levelIndex===0 && !this.samplePlayed && this.notes.length>=1){ this.startHintArrows(); this.samplePlayed=true; }
    this.noteG.clear();
    this.laneG.clear();
    LANES.forEach((x,i)=>{
      this.laneG.lineStyle(6,0xffffff,0.10).lineBetween(x,GAME_TOP+90,x,JUDGE_Y+8);
      this.laneG.lineStyle(3,C.cream,0.28).lineBetween(x-38,JUDGE_Y+14,x+38,JUDGE_Y+14);
    });
    this.notes=this.notes.filter(n=>{
      if(!n.hit) n.y+=n.speed*(delta/1000);
      const x=LANES[n.lane];
      if(!n.hit){
        if(this.levelIndex===0 && this.autoDemoHits>0 && Math.abs(n.y-JUDGE_Y)<10){ this.hitNote(n,'perfect'); this.autoDemoHits--; }
        const key=n.special?'uiRepair':'uiNote';
        this.noteG.fillStyle(n.special?C.gold:C.mint,1).fillRoundedRect(x-17,n.y-17,34,34,8);
        this.noteG.lineStyle(3,C.cream).strokeRoundedRect(x-17,n.y-17,34,34,8);
      }
      if(!n.hit && n.y>JUDGE_Y+58){ this.miss(5); return false; }
      if(n.hit){ this.cleared++; return false; }
      return true;
    });
    if(this.repairActive){
      this.repairActive.life-=delta/1000;
      if(this.repairActive.life<=0){ this.safety=Math.max(0,this.safety-10); this.repairActive.icon.destroy(); this.repairActive.arrow.destroy(); this.repairActive=null; this.showGuide('The nest got a bit shaky!'); }
    }
    if(this.nextIdx>=this.pattern.length && this.notes.length===0 && !this.over) this.finishLevel();
  }
  updateActors(time,dt){
    this.hero.y=GAME_TOP+160+Math.sin(time*0.008)*5;
    this.nest.y=GAME_TOP+170+Math.cos(time*0.007)*4;
    this.egg.angle=Math.sin(time*0.01)*4;
    if(this.storm){ this.storm.x=CX+Math.sin(time*0.004)*18; this.storm.y=GAME_TOP+102+Math.cos(time*0.005)*6; }
  }
  update(time,delta){
    animateBg(this,time);
    if(this.over) return;
    if(this.pauseText.visible){ this.updateHud(); return; }
    const dt=delta/1000;
    if(this.guideTime>0) this.guideTime-=dt;
    if(this.guideTimer>0) this.guideTimer-=dt;
    this.safety=Math.max(0,this.safety-this.level.drain*dt);
    if(this.level.storm && this.power>=100){ this.showGuide('A gold burst beat is ready! Hit it on time!'); }
    this.updateNotes(delta);
    this.updateActors(time,dt);
    this.updateHud();
    if(this.safety<=0) this.failLevel();
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  width:W,
  height:H,
  pixelArt:true,
  backgroundColor:'#1F1A38',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,parent:document.body},
  scene:[BootScene,TitleScene,PlayScene,FactScene,EndScene],
  input:{activePointers:3},
  render:{pixelArt:true,roundPixels:true,antialias:false}
});
</script>
