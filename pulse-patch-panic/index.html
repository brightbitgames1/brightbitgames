function clone(v){ return JSON.parse(JSON.stringify(v)); }
function roundNum(n){ return Math.max(0,Math.round(n)); }
function edgeMatch(edge,a,b){ return (edge[0]===a&&edge[1]===b)||(edge[0]===b&&edge[1]===a); }
function animateFloaters(scene,t){ if(scene.bgFloaters) scene.bgFloaters.forEach((f,i)=>{ f.x=f.baseX+Math.sin(t*0.00045+f.seed)*(i%2?8:5); f.y=f.baseY+Math.cos(t*0.00055+f.seed)*(i%2?6:4); }); }
function labelY(y,size=34){ const below=y+size+34, above=y-size-34; return below<=GAME_BOTTOM-26?below:Math.max(GAME_TOP+26,above); }
function addBadge(scene,x,y,text,fill=C.panel,textColor='#F7F4EA',width=null,depth=10,font='bold 16px "Trebuchet MS"'){
  const t=scene.add.text(0,0,text,{font,fill:textColor,align:'center',wordWrap:width?{width:width-24}:undefined,lineSpacing:4}).setOrigin(0.5);
  const w=width||Math.max(74,t.width+24), h=Math.max(30,t.height+14);
  const g=scene.add.graphics();
  g.fillStyle(fill,1).lineStyle(3,C.white,0.95).fillRoundedRect(-w/2,-h/2,w,h,12).strokeRoundedRect(-w/2,-h/2,w,h,12);
  const c=scene.add.container(x,y,[g,t]).setDepth(depth);
  return {container:c,bg:g,text:t,width:w,height:h};
}
function addButton(scene,x,y,w,h,text,fill,textColor,font='bold 26px "Trebuchet MS"'){
  const r=scene.add.rectangle(x,y,w,h,fill).setStrokeStyle(5,C.white).setInteractive();
  const t=scene.add.text(x,y,text,{font,fill:textColor}).setOrigin(0.5);
  scene.tweens.add({targets:r,scaleX:1.04,scaleY:1.04,duration:760,yoyo:true,repeat:-1,ease:'Sine.inOut'});
  return {rect:r,text:t};
}
function makePrimitiveTextures(scene){

  g.fillStyle(C.white).fillRect(16,18,8,8).fillRect(32,18,8,8);

function pxSprite(scene,key,x,y,w,h,depth=5){ return scene.add.image(x,y,key).setDisplaySize(w,h).setDepth(depth); }
function drawFrame(scene,theme){
  const top=theme==='storm'?0x2e1434:theme==='candy'?0x1f2654:0x22244d;
  const mid=theme==='storm'?0x521d49:theme==='candy'?0x2f4d7e:0x316180;
  const low=theme==='storm'?0x712547:theme==='candy'?0x54358a:0x4b367f;
  scene.add.rectangle(CX,H/2,W,H,top);
  scene.add.rectangle(CX,HUD_H/2,W,HUD_H,C.panel);
  scene.add.rectangle(CX,H-CTRL_H/2,W,CTRL_H,C.panel);
  scene.add.rectangle(CX,HUD_H+GAME_H/2,W,GAME_H,mid);
  if(scene.textures.exists('bgMain')){
    scene.add.image(CX,HUD_H+GAME_H/2,'bgMain').setDisplaySize(W-12,GAME_H-12).setAlpha(0.33).setDepth(0);
    scene.add.image(CX+10,HUD_H+GAME_H/2+8,'bgMain').setDisplaySize(W-36,GAME_H-42).setTint(theme==='storm'?0xff88aa:theme==='candy'?0xaad7ff:0xffefaa).setAlpha(0.18).setDepth(0);
  }
  scene.add.rectangle(CX,HUD_H+GAME_H/2,W-16,GAME_H-16,C.panel2,0.38).setStrokeStyle(4,C.white,0.35).setDepth(1);
  scene.bgFloaters=[];
  const tints=theme==='storm'?[C.pink,C.purple,C.peach]:theme==='candy'?[C.gold,C.blue,C.mint]:[C.mint,C.peach,C.gold];
  for(let i=0;i<12;i++){
    const f=pxSprite(scene,'homePx',46+(i*43)%W,96+(i*69)%H,24+(i%3)*8,24+(i%3)*8,1).setTint(tints[i%3]).setAlpha(0.12);
    f.baseX=f.x; f.baseY=f.y; f.seed=i*0.8; scene.bgFloaters.push(f);
  }
  for(let i=0;i<16;i++){
    const s=scene.add.image(20+(i*29)%W,104+(i*53)%H,'uiSpark').setScale(0.4+(i%3)*0.18).setAlpha(0.18).setDepth(1);
    s.baseX=s.x; s.baseY=s.y; s.seed=12+i*0.45; scene.bgFloaters.push(s);
  }
}

      addBadge(this,it.x,it.y+28,it.name,C.gold,'#1a1030',124,9,'bold 18px "Trebuchet MS"');

class CardScene extends Phaser.Scene{
  constructor(){ super('card'); }
  init(data){ this.info=data; }

    drawFrame(this,this.info.mode==='fail'?'storm':(this.info.nextIndex===2?'candy':'sun'));
    pxSprite(this,'heroPx',36,30,38,38,20); pxSprite(this,'dronePx',72,20,24,24,20);
    addBadge(this,CX,30,this.info.mode==='fail'?'TRY AGAIN':'LEVEL CLEAR',this.info.mode==='fail'?C.pink:C.mint,this.info.mode==='fail'?'#F7F4EA':'#1a1030',220,20,'bold 22px "Trebuchet MS"');
    const pW=460,pH=520,pX=CX,pY=GAME_TOP+GAME_H/2;
    this.add.graphics().fillStyle(C.panel,0.96).lineStyle(4,C.white,0.95).fillRoundedRect(pX-pW/2,pY-pH/2,pW,pH,28).strokeRoundedRect(pX-pW/2,pY-pH/2,pW,pH,28);
    if(this.info.mode==='fail'){
      pxSprite(this,'blobPx',CX,pY-124,140,140,8);
      addBadge(this,CX,pY-34,'The sparkle faded!',C.pink,'#F7F4EA',240,8,'bold 24px "Trebuchet MS"');
      this.add.text(CX,pY+36,'Pop the Grump Blobs sooner, keep the Smile Drops moving, and try again right away.',{font:'20px "Trebuchet MS"',fill:'#F7F4EA',align:'center',wordWrap:{width:380},lineSpacing:8}).setOrigin(0.5);
    }else{
      pxSprite(this,'homePx',CX,pY-124,128,128,8);
      addBadge(this,CX,pY-36,'Fun fact card',C.mint,'#1a1030',180,8,'bold 24px "Trebuchet MS"');
      this.add.text(CX,pY+8,FUN_FACTS[Math.min(this.info.levelIndex,FUN_FACTS.length-1)],{font:'20px "Trebuchet MS"',fill:'#F7F4EA',align:'center',wordWrap:{width:388},lineSpacing:8}).setOrigin(0.5);
      addBadge(this,CX,pY+126,`Next: ${LEVELS[this.info.nextIndex].name}`,C.gold,'#1a1030',250,8,'bold 20px "Trebuchet MS"');
      this.add.text(CX,pY+184,LEVELS[this.info.nextIndex].rule,{font:'18px "Trebuchet MS"',fill:'#F7F4EA',align:'center',wordWrap:{width:360}}).setOrigin(0.5);
    }
    addBadge(this,CX,870,`Smile Drops saved: ${this.info.saved}   Cheer left: ${roundNum(this.info.cheer)}%`,C.panel2,'#F7F4EA',350,20,'bold 18px "Trebuchet MS"');
    const main=addButton(this,CX,920,280,64,this.info.mode==='fail'?'TRY AGAIN':'NEXT LEVEL',this.info.mode==='fail'?C.pink:C.gold,this.info.mode==='fail'?'#F7F4EA':'#1a1030','bold 24px "Trebuchet MS"');
    main.rect.on('pointerdown',()=>this.scene.start('play',{levelIndex:this.info.mode==='fail'?this.info.levelIndex:this.info.nextIndex}));
    this.input.keyboard.on('keydown-SPACE',()=>this.scene.start('play',{levelIndex:this.info.mode==='fail'?this.info.levelIndex:this.info.nextIndex}));
  }
  update(t){ animateFloaters(this,t); }

      if(c.t<1) return true;
      const blockH=this.hazardOn(c.from,c.to), blockC=this.collapseOn(c.from,c.to);
      if((blockH||blockC)&&this.rushTime<=0){ this.cheer=Math.max(0,this.cheer-(blockC?7:5.5)); this.spark(p.x,p.y,C.pink); c.sprite.destroy(); return false; }
      if((blockH||blockC)&&this.rushTime>0){ if(blockH) blockH.hp=Math.max(0,blockH.hp-1); this.redrawMap(); }
      const node=this.map[c.to];
      if(node.type==='sink'){ this.onSaved(node); c.sprite.destroy(); return false; }
      c.from=c.to; c.hops++; c.to=this.currentNext(node,c); c.t=0; if(!c.to){ c.sprite.destroy(); return false; } return true;
    });
  }
  finishLevel(){ if(this.levelIndex===LEVELS.length-1) this.scene.start('end'); else this.scene.start('card',{mode:'clear',levelIndex:this.levelIndex,nextIndex:this.levelIndex+1,saved:this.saved,cheer:this.cheer}); }
  failLevel(){ this.scene.start('card',{mode:'fail',levelIndex:this.levelIndex,saved:this.saved,cheer:this.cheer}); }
  togglePause(){ this.pausedGame=!this.pausedGame; this.pauseText.setVisible(this.pausedGame); if(this.pausedGame) this.showBottom('Paused. Two-finger tap or press P to play again.',1.8); }
  updateHud(dt){
    if(this.bottomTimer>0) this.bottomTimer-=dt;
    const boss=this.level.boss, tail=boss?`STORM ${boss.hp}/${boss.max}   HEART ${boss.charge}/${boss.shieldGoal}${boss.vulnerable?' OPEN!':''}`:`SAVED ${this.saved}/${this.level.goal}`;
    this.statusBadge.text.setText(`CHEER ${roundNum(this.cheer)}%   ${this.allowRush?`RUSH ${roundNum(this.rush)}%   `:''}${tail}`);
    if(this.bottomTimer>0&&this.bottomMsg) this.bottomBadge.text.setText(this.bottomMsg);
    else this.bottomBadge.text.setText(this.isTouch?this.level.rule:(this.useKeyboardCursor?(this.allowRush?'Arrows move • Space pops • Enter flips turns • Shift uses Rush':'Arrows move • Space pops • Enter flips turns'):'Space pops nearest blob'));
  }
  update(t,delta){
    const dt=delta/1000; animateFloaters(this,t); if(this.pausedGame){ this.updateHud(dt); return; }
    this.moveCursor(dt);
    if(this.allowRush&&(this.wasd.SHIFT.isDown||this.flowHold)) this.rush=Math.min(100,this.rush+38*dt); else if(this.rushTime<=0) this.rush=Math.max(0,this.rush-12*dt);
    if(this.rushTime>0) this.rushTime=Math.max(0,this.rushTime-dt);
    this.cheer=Math.max(0,this.cheer-(this.level.cheerDrain-(this.rushTime>0?0.9:0))*dt);
    this.spawnClock+=delta; if(this.spawnClock>=this.level.spawnMs){ this.spawnClock=0; this.spawnDrop(); }
    this.updateSystems(dt); this.updateDrops(dt);
    if(this.cheer<=0) this.failLevel();
    this.updateHud(dt);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  width:W,
  height:H,
  pixelArt:true,
  backgroundColor:'#170f29',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,parent:document.body},
  scene:[BootScene,TitleScene,PlayScene,CardScene,EndScene],
  input:{activePointers:3},
  render:{pixelArt:true,roundPixels:true,antialias:false}
});
</script>
